name: Python Package using Conda

on: [push]

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout code
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2️⃣ Install Miniconda properly
    - name: Setup Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        python-version: "3.10"
        auto-update-conda: true
        activate-environment: base

    # 3️⃣ Update environment (SAFE FIX)
    - name: Install dependencies
      run: |
        conda env update --file environment.yml --name base || true

    # 4️⃣ Install tools explicitly (avoids missing packages)
    - name: Install lint + test tools
      run: |
        conda install -y flake8 pytest

    # 5️⃣ Lint
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    # 6️⃣ Test
    - name: Test with pytest
      run: pytest
