name: CI - Build APK (Stable)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64

    steps:
    # 1️⃣ Checkout
    - name: Checkout source
      uses: actions/checkout@v4

    # 2️⃣ Install system dependencies (VERY IMPORTANT)
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          python3-pip \
          build-essential \
          git \
          zip \
          unzip \
          openjdk-11-jdk \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libtinfo5 \
          cmake \
          libffi-dev \
          libssl-dev

        python3 -m pip install --upgrade pip
        pip install cython buildozer

    # 3️⃣ Verify presence of buildozer.spec
    - name: List files to verify buildozer.spec presence
      run: ls -l

    # 4️⃣ Change directory to where buildozer.spec is located
    - name: Change to app directory
      run: cd app  # <-- Replace 'app' with your directory name if different

    # 5️⃣ Clean previous build
    - name: Clean previous build
      run: |
        # Change to the directory first
        cd app  # Ensure this matches your directory structure
        if [ ! -f buildozer.spec ]; then
          echo "buildozer.spec not found!"
          exit 1
        fi
        buildozer android clean --force
        rm -rf .buildozer
        rm -rf ~/.buildozer

    # 6️⃣ Accept Android licenses
    - name: Accept Android licenses
      run: |
        cd app
        yes | sdkmanager --licenses || true

    # 7️⃣ Build APK
    - name: Build with Buildozer
      run: |
        cd app
        buildozer -v android debug --force

    # 8️⃣ Upload APK artifact
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: |
          app/.buildozer/android/platform/build-*/dists/*/bin/*.apk
